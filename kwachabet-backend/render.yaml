services:
  - type: web
    name: kwachabet-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kwachabet-db
          property: connectionString
    autoDeploy: true
    healthCheckPath: /health

databases:
  - name: kwachabet-db
    databaseName: kwachabet
    user: kwachabet_user
    region: frankfurt
    plan: free
